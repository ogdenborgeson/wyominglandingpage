<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyoming Tattoo Supply</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            text-align: center;
            color: #fff;
        }

        /* This wrapper keeps the image centered and responsive */
        .image-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .promo-text {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .button-container {
            margin: 30px 0 60px 0;
        }

        .shop-button {
            background-color: #ffffff;
            color: #000000;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            border: 2px solid #000;
            transition: 0.2s ease-in-out;
        }

        .shop-button:hover {
            background-color: #000;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="image-wrapper">
        <img class="hero-image" src="https://cdn.shopify.com/s/files/1/0278/5814/1318/files/Wyoming_Landing_Page.png?v=1783121120" alt="Wyoming Tattoo Supply">
    </div>

    <div class="promo-text">
        Use code "Wyoming" for 10% off your first order!
    </div>

    <div class="button-container">
        <a class="shop-button" href="https://solidstatetattoosupply.com">SHOP NOW</a>
    </div>

</body>
</html>
