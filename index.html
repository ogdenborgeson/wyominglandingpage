<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyoming Tattoo Supply</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            text-align: center;
            color: #fff;
        }

        /* Kansas-style responsive image */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* Kansas-style width control */
            margin: 0 auto;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Centered overlay content */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .promo-text {
            font-size: 26px;
            font-weight: bold;
            color: #9cd7ff; /* Light blue from the image */
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .shop-button {
            background-color: #9cd7ff; /* Light blue button */
            color: #000;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            border: 2px solid #000;
            transition: 0.2s ease-in-out;
        }

        .shop-button:hover {
            background-color: #000;
            color: #9cd7ff;
        }
    </style>
</head>

<body>

    <div class="image-container">
        <img class="hero-image" src="https://cdn.shopify.com/s/files/1/0278/5814/1318/files/Wyoming_Landing_Page.jpg?v=1783123324" alt="Wyoming Tattoo Supply">

        <div class="overlay">
            <div class="promo-text">
                Use code "Wyoming" for 10% off your first order!
            </div>

            <a class="shop-button" href="https://solidstatetattoosupply.com">SHOP NOW</a>
        </div>
    </div>

</body>
</html>
